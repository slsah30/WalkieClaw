<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WalkieClaw Display Simulator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 24px; gap: 28px; min-height: 100vh; }

/* Board */
.board-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.board { background: #e87a20; border-radius: 14px; padding: 18px 20px 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 6px 24px rgba(0,0,0,0.5); position: relative; width: 424px; }
.board::before, .board::after { content: ''; position: absolute; width: 10px; height: 10px; border-radius: 50%; background: #333; border: 1px solid #555; top: 8px; }
.board::before { left: 10px; }
.board::after { right: 10px; }
.mount-bl, .mount-br { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: #333; border: 1px solid #555; bottom: 8px; }
.mount-bl { left: 10px; }
.mount-br { right: 10px; }

.display-bezel { background: #111; border-radius: 4px; padding: 3px; }
canvas#tft { width: 384px; height: 384px; image-rendering: pixelated; display: block; border: 1px solid #333; }

.board-label { color: #fff; font-size: 11px; font-weight: 600; letter-spacing: 1px; opacity: 0.85; }
.led-row { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.led { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #444; transition: background 0.3s, box-shadow 0.3s; }
.led-label { font-size: 10px; color: #ccc; }
.speaker-grille { display: flex; gap: 3px; margin-top: 4px; }
.speaker-grille span { width: 3px; height: 14px; background: #333; border-radius: 1px; }

.btn-row { display: flex; gap: 20px; margin-top: 8px; width: 100%; justify-content: space-between; padding: 0 20px; }
.hw-btn { padding: 10px 28px; border-radius: 8px; border: 2px solid #555; background: #2a2a3e; color: #e0e0e0; font-weight: 600; cursor: pointer; font-size: 13px; user-select: none; transition: background 0.15s; }
.hw-btn:hover { background: #3a3a5e; }
.hw-btn:active, .hw-btn.active { background: #5050a0; border-color: #88f; }

/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 14px; width: 340px; }
.panel { background: #16213e; border-radius: 10px; padding: 14px; border: 1px solid #1a3060; }
.panel h3 { font-size: 12px; color: #7aa2f7; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.state-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.state-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid #444; background: #1e2d50; color: #bbb; cursor: pointer; font-size: 11px; font-weight: 500; }
.state-btn.active { background: #2d4a7a; color: #fff; border-color: #7aa2f7; }
.chk-row { display: flex; gap: 14px; margin-top: 6px; }
.chk-row label { font-size: 11px; display: flex; align-items: center; gap: 4px; cursor: pointer; }

.color-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.color-row .lbl { width: 70px; font-size: 11px; color: #aaa; }
.color-row input[type="color"] { width: 28px; height: 22px; border: 1px solid #444; border-radius: 3px; background: none; cursor: pointer; padding: 0; }
.color-row input[type="text"] { width: 72px; background: #0d1b30; border: 1px solid #333; color: #ddd; border-radius: 3px; padding: 2px 5px; font-size: 11px; font-family: monospace; }
.color-row .inv-preview { font-size: 10px; color: #888; margin-left: 4px; }

.text-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.text-row .lbl { width: 50px; font-size: 11px; color: #aaa; }
.text-row input[type="text"] { flex: 1; background: #0d1b30; border: 1px solid #333; color: #ddd; border-radius: 3px; padding: 4px 6px; font-size: 11px; }

.export-btn { padding: 6px 14px; background: #2d4a7a; border: 1px solid #4a6fa5; color: #ddd; border-radius: 5px; cursor: pointer; font-size: 11px; }
.export-btn:hover { background: #3a5a8a; }
.export-area { width: 100%; background: #0d1b30; border: 1px solid #333; color: #a0d0a0; font-family: monospace; font-size: 10px; padding: 8px; border-radius: 4px; margin-top: 8px; resize: vertical; min-height: 100px; }
</style>
</head>
<body>

<div class="board-wrap">
  <div class="board">
    <div class="mount-bl"></div>
    <div class="mount-br"></div>
    <div class="display-bezel">
      <canvas id="tft" width="128" height="128"></canvas>
    </div>
    <div class="board-label">xorigin AI</div>
    <div class="led-row">
      <div class="led" id="ws-led"></div>
      <span class="led-label">WS2812</span>
    </div>
    <div class="speaker-grille">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="btn-row">
    <button class="hw-btn" id="btn-vol">Volume</button>
    <button class="hw-btn" id="btn-talk">Talk</button>
  </div>
</div>

<div class="sidebar">
  <!-- State Controls -->
  <div class="panel">
    <h3>State Controls</h3>
    <div class="state-btns">
      <button class="state-btn active" data-state="0">IDLE</button>
      <button class="state-btn" data-state="1">REC</button>
      <button class="state-btn" data-state="2">POLL</button>
      <button class="state-btn" data-state="3">PLAY</button>
    </div>
    <div class="chk-row">
      <label><input type="checkbox" id="chk-battery"> Battery</label>
      <label><input type="checkbox" id="chk-setup"> Setup Mode</label>
      <label><input type="checkbox" id="chk-charging"> Charging</label>
    </div>
  </div>

  <!-- Widget Colors -->
  <div class="panel">
    <h3>Widget Colors</h3>
    <div id="color-pickers"></div>
  </div>

  <!-- Bar Colors -->
  <div class="panel">
    <h3>Bar Colors (hardware inverted)</h3>
    <div id="bar-pickers"></div>
  </div>

  <!-- Editable Text -->
  <div class="panel">
    <h3>Editable Text</h3>
    <div id="text-inputs"></div>
  </div>

  <!-- Export -->
  <div class="panel">
    <h3>Export YAML Colors</h3>
    <button class="export-btn" id="btn-export">Export YAML Colors</button>
    <button class="export-btn" id="btn-copy" style="margin-left:6px">Copy</button>
    <textarea class="export-area" id="export-area" readonly rows="8"></textarea>
  </div>
</div>

<script>
// ── Config ──
const SCALE = 1; // canvas is 128x128, CSS scales to 384x384
const W = 128, H = 128;

const COLORS = {
  lbl_status:  '#FF69B4',
  lbl_ip:      '#88CCFF',
  lbl_wifi:    '#88CCFF',
  lbl_bridge:  '#FFFFFF',
  lbl_battery: '#FFA500',
  lbl_action:  '#3FB950',
  lbl_reply:   '#888888',
};

const BAR_COLORS = {
  ip_bar_bg: '#763B06',  // YAML value (displays as XOR on hardware)
  vu_meter:  '#3388FF',
};

const TEXTS = {
  title:   'WalkieClaw',
  ip:      'IP 192.168.1.42',
  wifi:    'WiFi 3/3',
  bridge:  'Bridge: 1.2.3.4',
  battery: '75%',
  action:  'Ready',
  reply:   'Hello from AI!',
};

// State: 0=IDLE, 1=RECORDING, 2=POLLING, 3=PLAYING
let state = 0;
let batteryMode = false;
let setupMode = false;
let chargingMode = false;
let volume = 0.75;
let vuValue = 0;
let vuDir = 1;
let scrollOffset = 0;
let pollingSubstate = 0; // 0=Transcribing, 1=Thinking, 2=Generating
let pollingTimer = null;
let playTimer = null;
let volLabelTimer = null;
let amberPulsePhase = 0;

const LED_COLORS = {
  0: batteryMode ? 'rgb(255,128,0)' : 'rgb(0,255,0)',    // IDLE: green (or amber pulse)
  1: 'rgb(255,0,0)',      // RECORDING: red
  2: 'rgb(0,0,255)',      // POLLING: blue
  3: 'rgb(255,128,0)',    // PLAYING: amber
};

const STATE_LABELS = {
  0: 'Ready',
  1: 'Listening...',
  2: 'Processing...',
  3: 'Speaking...',
};

const POLLING_STAGES = ['Transcribing...', 'Thinking...', 'Generating...'];

// ── Canvas Setup ──
const canvas = document.getElementById('tft');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ── Font helpers ──
function fontInter(size) { return `600 ${size}px Inter, sans-serif`; }
function fontMont(size) { return `500 ${size}px Montserrat, sans-serif`; }

// ── Hex conversions ──
function hexToRgb(hex) {
  hex = hex.replace('#', '');
  return { r: parseInt(hex.substr(0,2),16), g: parseInt(hex.substr(2,2),16), b: parseInt(hex.substr(4,2),16) };
}
function rgbToHex(r,g,b) { return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join(''); }
function invertColor(hex) {
  const c = hexToRgb(hex);
  return rgbToHex(255-c.r, 255-c.g, 255-c.b);
}

// ── Draw ──
function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Row 1: Title (y=8, TOP_MID)
  ctx.font = fontInter(12);
  ctx.fillStyle = COLORS.lbl_status;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const titleText = setupMode ? 'WalkieClaw Setup' : TEXTS.title;
  ctx.fillText(titleText, W/2, 8);

  // Row 2: IP bar bg (y=22, TOP_MID, 124x14)
  // Bar display color = YAML XOR 0xFFFFFF (hardware inversion)
  const barDisplayColor = invertColor(BAR_COLORS.ip_bar_bg);
  ctx.fillStyle = barDisplayColor;
  ctx.fillRect((W - 124)/2, 22, 124, 14);

  // Row 2: IP label (y=24, TOP_LEFT x=4)
  ctx.font = fontMont(10);
  ctx.fillStyle = COLORS.lbl_ip;
  ctx.textAlign = 'left';
  ctx.fillText(TEXTS.ip, 4, 24);

  // Row 2: WiFi label (y=24, TOP_RIGHT x=-4)
  ctx.textAlign = 'right';
  ctx.fillText(TEXTS.wifi, W - 4, 24);

  // Thin blue separator line (2px below banner bar)
  ctx.fillStyle = barDisplayColor;
  ctx.fillRect((W - 124)/2, 38, 124, 2);

  // Row 3: Bridge (y=42, TOP_LEFT x=4, width 95, CLIP)
  ctx.font = fontMont(10);
  ctx.textAlign = 'left';
  const bridgeText = setupMode ? 'Bridge: no wifi' : TEXTS.bridge;
  const bridgeColor = setupMode ? '#FF4444' : COLORS.lbl_bridge;
  ctx.fillStyle = bridgeColor;
  ctx.save();
  ctx.beginPath();
  ctx.rect(4, 38, 95, 14);
  ctx.clip();
  ctx.fillText(bridgeText, 4, 40);
  ctx.restore();

  // Row 3: Battery (y=40, TOP_RIGHT x=-4)
  ctx.textAlign = 'right';
  let batText = TEXTS.battery;
  let batColor = COLORS.lbl_battery;
  if (batteryMode || chargingMode) {
    const pct = parseInt(TEXTS.battery) || 75;
    if (chargingMode) {
      batText = pct + '%';
      batColor = '#00FF00';
    } else {
      batText = pct + '%';
      if (pct > 20) batColor = '#00FF00';
      else if (pct > 10) batColor = '#FFCC00';
      else batColor = '#FF0000';
    }
  }
  ctx.fillStyle = batColor;
  ctx.fillText(batText, W - 4, 40);

  // Row 4: Action (y=56, TOP_LEFT x=4)
  ctx.font = fontMont(14);
  ctx.fillStyle = COLORS.lbl_action;
  ctx.textAlign = 'left';
  let actionText = STATE_LABELS[state] || TEXTS.action;
  if (state === 0) actionText = TEXTS.action;
  if (state === 2) actionText = POLLING_STAGES[pollingSubstate] || 'Processing...';
  if (setupMode && state === 0) actionText = 'Join WiFi AP';
  ctx.fillText(actionText, 4, 56);

  // Row 5: Reply (y=76, TOP_LEFT x=4, width 120, height 24, SCROLL_CIRCULAR)
  ctx.font = fontMont(18);
  const replyColor = (state === 2 || state === 3) ? '#FFCC44' : COLORS.lbl_reply;
  ctx.fillStyle = replyColor;
  ctx.textAlign = 'left';
  const replyText = setupMode && state === 0
    ? 'Connect to WalkieClaw-Fallback, pass:12345678, go to 192.168.4.1'
    : TEXTS.reply;

  ctx.save();
  ctx.beginPath();
  ctx.rect(4, 74, 120, 26);
  ctx.clip();
  const textWidth = ctx.measureText(replyText).width;
  if (textWidth > 120) {
    const gap = 40;
    const totalWidth = textWidth + gap;
    const x = 4 - (scrollOffset % totalWidth);
    ctx.fillText(replyText, x, 78);
    ctx.fillText(replyText, x + totalWidth, 78);
  } else {
    ctx.fillText(replyText, 4, 78);
  }
  ctx.restore();

  // VU meter (BOTTOM_MID, y=-4, 118x4)
  const vuY = H - 4 - 4;
  const vuX = (W - 118) / 2;
  // bg
  ctx.fillStyle = '#111';
  ctx.fillRect(vuX, vuY, 118, 4);
  // indicator
  if (vuValue > 0) {
    const vuDisplayColor = invertColor(BAR_COLORS.vu_meter);
    ctx.fillStyle = vuDisplayColor;
    ctx.fillRect(vuX, vuY, 118 * vuValue / 100, 4);
  }
}

// ── LED Update ──
function updateLED() {
  const led = document.getElementById('ws-led');
  if (state === 0 && batteryMode && !chargingMode) {
    // Amber pulse
    const brightness = 0.1 + 0.9 * (0.5 + 0.5 * Math.sin(amberPulsePhase));
    led.style.background = `rgba(255,128,0,${brightness})`;
    led.style.boxShadow = `0 0 ${8*brightness}px rgba(255,128,0,${brightness})`;
  } else {
    let color;
    switch(state) {
      case 0: color = 'rgb(0,255,0)'; break;
      case 1: color = 'rgb(255,0,0)'; break;
      case 2: color = 'rgb(0,0,255)'; break;
      case 3: color = 'rgb(255,128,0)'; break;
    }
    led.style.background = color;
    led.style.boxShadow = `0 0 8px ${color}`;
  }
}

// ── State Machine ──
function setState(s) {
  state = s;
  clearTimeout(pollingTimer);
  clearTimeout(playTimer);
  pollingSubstate = 0;

  if (s === 1) {
    vuValue = 0;
  } else if (s === 2) {
    vuValue = 0;
    pollingCycle();
  } else if (s === 3) {
    vuValue = 0;
  } else {
    vuValue = 0;
  }

  document.querySelectorAll('.state-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.state) === s);
  });
  updateLED();
  draw();
}

function pollingCycle() {
  if (state !== 2) return;
  pollingSubstate++;
  if (pollingSubstate >= 3) {
    // Done polling → PLAYING
    setState(3);
    playTimer = setTimeout(() => setState(0), 3000);
    return;
  }
  draw();
  pollingTimer = setTimeout(pollingCycle, 2000);
}

// ── Button handlers ──
const talkBtn = document.getElementById('btn-talk');
talkBtn.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (state !== 0) return;
  talkBtn.classList.add('active');
  setState(1);
});
talkBtn.addEventListener('mouseup', (e) => {
  e.preventDefault();
  talkBtn.classList.remove('active');
  if (state !== 1) return;
  setState(2);
});
talkBtn.addEventListener('mouseleave', () => {
  if (talkBtn.classList.contains('active')) {
    talkBtn.classList.remove('active');
    if (state === 1) setState(2);
  }
});

const VOL_STEPS = [
  { val: 0, label: 'Vol: Off' },
  { val: 0.45, label: 'Vol: Low' },
  { val: 0.60, label: 'Vol: Med' },
  { val: 0.70, label: 'Vol: Normal' },
  { val: 0.80, label: 'Vol: Loud' },
];
let volIndex = 3; // start at Normal (70%)
document.getElementById('btn-vol').addEventListener('click', () => {
  volIndex = (volIndex + 1) % VOL_STEPS.length;
  volume = VOL_STEPS[volIndex].val;
  TEXTS.action = VOL_STEPS[volIndex].label;
  draw();
  clearTimeout(volLabelTimer);
  volLabelTimer = setTimeout(() => {
    if (state === 0) TEXTS.action = 'Ready';
    draw();
  }, 2000);
});

// State buttons
document.querySelectorAll('.state-btn').forEach(b => {
  b.addEventListener('click', () => {
    clearTimeout(playTimer);
    setState(parseInt(b.dataset.state));
    if (state === 3) playTimer = setTimeout(() => setState(0), 3000);
  });
});

// Checkboxes
document.getElementById('chk-battery').addEventListener('change', (e) => {
  batteryMode = e.target.checked;
  updateLED(); draw();
});
document.getElementById('chk-setup').addEventListener('change', (e) => {
  setupMode = e.target.checked;
  draw();
});
document.getElementById('chk-charging').addEventListener('change', (e) => {
  chargingMode = e.target.checked;
  updateLED(); draw();
});

// ── Color Pickers ──
const colorPickerEl = document.getElementById('color-pickers');
const colorWidgets = [
  { key: 'lbl_status', label: 'lbl_status' },
  { key: 'lbl_ip', label: 'lbl_ip' },
  { key: 'lbl_bridge', label: 'lbl_bridge' },
  { key: 'lbl_battery', label: 'lbl_battery' },
  { key: 'lbl_action', label: 'lbl_action' },
  { key: 'lbl_reply', label: 'lbl_reply' },
];
colorWidgets.forEach(({ key, label }) => {
  const row = document.createElement('div');
  row.className = 'color-row';
  row.innerHTML = `
    <span class="lbl">${label}</span>
    <input type="color" id="cp-${key}" value="${COLORS[key]}">
    <input type="text" id="ct-${key}" value="${COLORS[key]}">
  `;
  colorPickerEl.appendChild(row);
  const cp = row.querySelector(`#cp-${key}`);
  const ct = row.querySelector(`#ct-${key}`);
  cp.addEventListener('input', () => { COLORS[key] = cp.value; ct.value = cp.value; draw(); });
  ct.addEventListener('change', () => {
    let v = ct.value.trim();
    if (!v.startsWith('#')) v = '#' + v;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) { COLORS[key] = v; cp.value = v; draw(); }
  });
});

// ── Bar Color Pickers ──
const barPickerEl = document.getElementById('bar-pickers');
const barWidgets = [
  { key: 'ip_bar_bg', label: 'ip_bar_bg' },
  { key: 'vu_meter', label: 'vu_meter' },
];
barWidgets.forEach(({ key, label }) => {
  const invDisplay = invertColor(BAR_COLORS[key]);
  const row = document.createElement('div');
  row.className = 'color-row';
  row.innerHTML = `
    <span class="lbl">${label}</span>
    <input type="color" id="bp-${key}" value="${BAR_COLORS[key]}">
    <input type="text" id="bt-${key}" value="${BAR_COLORS[key]}">
    <span class="inv-preview" id="bv-${key}">→ ${invDisplay}</span>
  `;
  barPickerEl.appendChild(row);
  const bp = row.querySelector(`#bp-${key}`);
  const bt = row.querySelector(`#bt-${key}`);
  const bv = row.querySelector(`#bv-${key}`);
  const update = (val) => {
    BAR_COLORS[key] = val;
    bp.value = val;
    bt.value = val;
    bv.textContent = '→ ' + invertColor(val);
    draw();
  };
  bp.addEventListener('input', () => update(bp.value));
  bt.addEventListener('change', () => {
    let v = bt.value.trim();
    if (!v.startsWith('#')) v = '#' + v;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) update(v);
  });
});

// ── Text Inputs ──
const textInputEl = document.getElementById('text-inputs');
const textFields = [
  { key: 'title', label: 'title' },
  { key: 'ip', label: 'ip' },
  { key: 'bridge', label: 'bridge' },
  { key: 'battery', label: 'battery' },
  { key: 'action', label: 'action' },
  { key: 'reply', label: 'reply' },
];
textFields.forEach(({ key, label }) => {
  const row = document.createElement('div');
  row.className = 'text-row';
  row.innerHTML = `
    <span class="lbl">${label}</span>
    <input type="text" id="ti-${key}" value="${TEXTS[key]}">
  `;
  textInputEl.appendChild(row);
  row.querySelector(`#ti-${key}`).addEventListener('input', (e) => {
    TEXTS[key] = e.target.value;
    draw();
  });
});

// ── Export ──
document.getElementById('btn-export').addEventListener('click', () => {
  const lines = [
    '# WalkieClaw LVGL Colors (from simulator)',
    '# Paste into lvgl: pages: widgets section',
    '',
    '# Label text colors:',
    `lbl_status  text_color: 0x${COLORS.lbl_status.slice(1).toUpperCase()}`,
    `lbl_ip      text_color: 0x${COLORS.lbl_ip.slice(1).toUpperCase()}`,
    `lbl_bridge  text_color: 0x${COLORS.lbl_bridge.slice(1).toUpperCase()}`,
    `lbl_battery text_color: 0x${COLORS.lbl_battery.slice(1).toUpperCase()}`,
    `lbl_action  text_color: 0x${COLORS.lbl_action.slice(1).toUpperCase()}`,
    `lbl_reply   text_color: 0x${COLORS.lbl_reply.slice(1).toUpperCase()}`,
    '',
    '# Bar indicator bg_color (YAML values — hardware-inverted on ST7735):',
    `ip_bar_bg   bg_color: 0x${BAR_COLORS.ip_bar_bg.slice(1).toUpperCase()}  # displays as ${invertColor(BAR_COLORS.ip_bar_bg)}`,
    `vu_meter    bg_color: 0x${BAR_COLORS.vu_meter.slice(1).toUpperCase()}  # displays as ${invertColor(BAR_COLORS.vu_meter)}`,
  ];
  document.getElementById('export-area').value = lines.join('\n');
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const area = document.getElementById('export-area');
  area.select();
  navigator.clipboard.writeText(area.value);
});

// ── Animation Loop ──
let lastTime = 0;
function animate(time) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  // Scroll circular
  const replyText = setupMode && state === 0
    ? 'Connect to WalkieClaw-Fallback, pass:12345678, go to 192.168.4.1'
    : TEXTS.reply;
  ctx.font = fontMont(18);
  const tw = ctx.measureText(replyText).width;
  if (tw > 120) {
    scrollOffset += dt * 30; // px/sec
  } else {
    scrollOffset = 0;
  }

  // VU meter animation
  if (state === 1 || state === 3) {
    vuValue += vuDir * dt * 120;
    if (vuValue > 100) { vuValue = 100; vuDir = -1; }
    if (vuValue < 10) { vuValue = 10; vuDir = 1; }
  }

  // Amber pulse
  if (state === 0 && batteryMode && !chargingMode) {
    amberPulsePhase += dt * 1.26; // 5s cycle
  }

  updateLED();
  draw();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
