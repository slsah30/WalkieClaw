# =============================================================================
# WalkieClaw — Voice Terminal Firmware (Direct HTTP Polling)
# =============================================================================
# ESP32 sends UDP audio to bridge, polls HTTP for responses.
# All connections ESP32-initiated (outbound only). No tunnels needed.
#
# Architecture:
#   ESP32 --UDP audio--> bridge:12345              (mic PCM + START/STOP)
#   ESP32 --HTTP poll--> bridge:8080/api/response  (check for AI response)
#   ESP32 <--HTTP GET--- bridge:8080/audio/*.wav   (fetch TTS audio)
#
# bridge_host + API key: Configured at runtime via the built-in web UI.
#   Flash once, connect to WalkieClaw-Fallback AP, enter WiFi creds,
#   then visit http://<device_ip>/ to set bridge host and API key.
#
# Hardware: AIPI Lite (ESP32-S3-WROOM-1, 16MB flash, 8MB PSRAM octal)
#           ES8311 audio codec (I2C ctrl + I2S data)
#           128x128 TFT LCD (SPI, ST7735)
#           WS2812 addressable LED, MEMS mic, 8ohm 0.8W speaker
#
# Pinout (verified working):
#   SPI:  CLK=GPIO16, MOSI=GPIO17
#   LCD:  DC=GPIO7, CS=GPIO15, Reset=GPIO18, Backlight=GPIO3
#   I2C:  SDA=GPIO5, SCL=GPIO4
#   I2S:  LRCLK=GPIO12, BCLK=GPIO14, MCLK=GPIO6, DOUT=GPIO11, DIN=GPIO13
#   LED:  GPIO46 (WS2812)
#   Speaker Amp: GPIO9
#   Right Button: GPIO42
# =============================================================================

substitutions:
  device_name: "walkieclaw"
  friendly_name: "WalkieClaw"
  # bridge_host is now configured at runtime via the web UI (text entity cfg_bridge_host)
  bridge_udp_port: "12345"
  bridge_http_port: "8080"
  sleep_timeout_ms: "300000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - udp_stream.h
    - wifi_connect.h
  on_boot:
    priority: 800
    then:
      - switch.turn_on: power_hold
      - light.turn_on:
          id: status_led
          brightness: 15%
          red: 0%
          green: 0%
          blue: 100%
      - delay: 2s
      - light.turn_on:
          id: status_led
          brightness: 15%
          red: 0%
          green: 100%
          blue: 0%
      - delay: 1s
      - lambda: |-
          std::string host = id(cfg_bridge_host).state;
          if (!host.empty()) {
            udp_stream.setup(host.c_str(), ${bridge_udp_port});
            ESP_LOGI("boot", "Bridge: %s", host.c_str());
          } else {
            ESP_LOGW("boot", "Bridge host not configured");
          }
      - lambda: |-
          id(last_activity_ms) = millis();
      - if:
          condition:
            lambda: 'return id(cfg_bridge_host).state.empty();'
          then:
            - lvgl.label.update:
                id: lbl_action
                text: "Setup needed"
          else:
            - lvgl.label.update:
                id: lbl_action
                text: "Ready"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

# =============================================================================
# Globals — voice state machine + poll tracking
# =============================================================================
# voice_state: 0=IDLE, 1=RECORDING, 2=POLLING, 3=PLAYING, 4=READY_TO_PLAY
globals:
  - id: speaker_volume
    type: float
    restore_value: true
    initial_value: '0.70'
  - id: voice_state
    type: int
    restore_value: false
    initial_value: '0'
  - id: poll_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: pending_wav_url
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: play_duration_ms
    type: int
    restore_value: false
    initial_value: '3000'
  - id: last_activity_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: boot_chime_played
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: battery_pct
    type: int
    restore_value: false
    initial_value: '-1'
  - id: blink_on
    type: bool
    restore_value: false
    initial_value: 'true'

font:
  - file: "gfonts://Inter"
    id: inter_12
    size: 12

logger:
  level: DEBUG
  logs:
    component: ERROR

# =============================================================================
# WiFi
# =============================================================================
wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 10
    - ssid: !secret hotspot_ssid
      password: !secret hotspot_password
      priority: 0
  power_save_mode: none
  ap:
    ssid: "WalkieClaw-Fallback"
    password: !secret fallback_password

captive_portal:

# =============================================================================
# ESPHome API (kept for OTA + best-effort display updates from bridge)
# =============================================================================
api:
  reboot_timeout: 0s
  encryption:
    key: !secret api_encryption_key
  services:
    - service: play_tts
      variables:
        url: string
      then:
        - switch.turn_on: speaker_enable
        - lambda: |-
            // Unmute DAC and set volume to 0dB on ES8311
            uint8_t dac_vol[2] = {0x32, 0x00};
            id(i2c_bus).write(0x18, dac_vol, 2);
            uint8_t dac_ctrl[2] = {0x37, 0x08};
            id(i2c_bus).write(0x18, dac_ctrl, 2);
        - delay: 50ms
        - media_player.volume_set:
            id: openclaw_player
            volume: !lambda 'return id(speaker_volume);'
        - media_player.play_media:
            id: openclaw_player
            media_url: !lambda 'return url;'
            announcement: true
        - lvgl.label.update:
            id: lbl_action
            text: "Speaking..."

    - service: update_display
      variables:
        status_text: string
        action_text: string
        response_text: string
      then:
        - lvgl.label.update:
            id: lbl_status
            text: !lambda 'return status_text;'
        - lvgl.label.update:
            id: lbl_action
            text: !lambda 'return action_text;'
        - lambda: |-
            lv_label_set_text(id(lbl_reply), response_text.c_str());
            lv_obj_invalidate(id(lbl_reply));

    - service: connect_wifi
      variables:
        ssid: string
        password: string
      then:
        - lambda: |-
            connect_to_wifi(ssid, password);
        - lvgl.label.update:
            id: lbl_action
            text: !lambda |-
              return "WiFi:" + ssid.substr(0, 10);

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

# =============================================================================
# HTTP Request component (for polling VPS)
# =============================================================================
http_request:
  timeout: 3s
  useragent: "WalkieClaw/1.0"

# --- I2C Bus (ES8311 codec control) ---
i2c:
  id: i2c_bus
  sda: GPIO5
  scl: GPIO4
  scan: true
  frequency: 400kHz

# --- SPI Bus (128x128 TFT LCD) ---
spi:
  clk_pin: GPIO16
  mosi_pin: GPIO17

# --- Display (ST7735, 128x128) ---
display:
  - platform: mipi_spi
    id: lcd_display
    model: ST7735
    dc_pin: GPIO7
    cs_pin: GPIO15
    reset_pin: GPIO18
    dimensions: 128x128
    rotation: 90
    invert_colors: false
    auto_clear_enabled: false
    update_interval: 1s

lvgl:
  displays:
    - lcd_display
  touchscreens: []
  style_definitions:
    - id: black_bg
      bg_color: 0x000000
      bg_opa: COVER
  pages:
    - id: main_page
      styles: black_bg
      widgets:
        # --- Row 1: Title (y=4) ---
        - label:
            id: lbl_status
            align: TOP_MID
            y: 8
            text: "WalkieClaw"
            text_color: 0xFF69B4
            text_font: inter_12

        # --- Row 2: IP + WiFi bar (y=22) ---
        - bar:
            id: ip_bar_bg
            align: TOP_MID
            y: 22
            width: 124
            height: 14
            min_value: 0
            max_value: 100
            value: 100
            radius: 0
            indicator:
              bg_color: 0x763B06
              border_width: 0
              radius: 0
        - label:
            id: lbl_ip
            align: TOP_LEFT
            x: 4
            y: 24
            text: "IP ..."
            text_color: 0x88CCFF
            text_font: montserrat_10
        - label:
            id: lbl_wifi
            align: TOP_RIGHT
            x: -4
            y: 24
            text: "WiFi ..."
            text_color: 0x88CCFF
            text_font: montserrat_10

        # --- Thin blue separator line below banner ---
        - bar:
            id: banner_sep
            align: TOP_MID
            y: 38
            width: 124
            height: 2
            min_value: 0
            max_value: 100
            value: 100
            radius: 0
            indicator:
              bg_color: 0x763B06
              border_width: 0
              radius: 0

        # --- Row 3: Bridge + Battery (y=40) ---
        - label:
            id: lbl_bridge
            align: TOP_LEFT
            x: 4
            y: 40
            width: 95
            text: "Bridge: ..."
            text_color: 0xFFFFFF
            text_font: montserrat_10
            long_mode: CLIP
        - label:
            id: lbl_battery
            align: TOP_RIGHT
            x: -4
            y: 40
            text: "---"
            text_color: 0xFFA500
            text_font: montserrat_10

        # --- Row 4: Action status (y=56) ---
        - label:
            id: lbl_action
            align: TOP_LEFT
            x: 4
            y: 56
            text: "Booting"
            text_color: 0x3FB950
            text_font: montserrat_14

        # --- Row 5: Response text — scrolling (y=76) ---
        - label:
            id: lbl_reply
            align: TOP_LEFT
            x: 4
            y: 76
            width: 120
            height: 24
            long_mode: SCROLL_CIRCULAR
            anim_time: 10s
            text: "..."
            text_color: 0x888888
            text_font: montserrat_18

        # --- VU meter at bottom ---
        - bar:
            id: vu_meter
            align: BOTTOM_MID
            y: -4
            width: 118
            height: 4
            min_value: 0
            max_value: 100
            value: 0
            indicator:
              bg_color: 0x3388FF

# --- Power Hold (GPIO10) — keeps device alive on battery ---
switch:
  - platform: gpio
    pin: GPIO10
    id: power_hold
    name: "Power Hold"
    restore_mode: ALWAYS_ON
    internal: true

  # --- LCD Backlight (GPIO3) ---
  - platform: gpio
    pin: GPIO3
    id: lcd_backlight
    name: "LCD Backlight"
    restore_mode: RESTORE_DEFAULT_ON

  # --- Speaker Amp Enable (GPIO9) ---
  - platform: gpio
    pin: GPIO9
    id: speaker_enable
    name: "Speaker Amp"
    restore_mode: ALWAYS_ON

# --- Status LED (WS2812 on GPIO46) ---
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO46
    num_leds: 1
    name: "Status LED"
    id: status_led
    restore_mode: RESTORE_DEFAULT_ON

# =============================================================================
# Audio - ES8311 codec via I2C + I2S
# =============================================================================
audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 16000
    i2c_id: i2c_bus

i2s_audio:
  - id: i2s_shared
    i2s_lrclk_pin: GPIO12
    i2s_bclk_pin: GPIO14
    i2s_mclk_pin: GPIO6

# Speaker
speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_shared
    i2s_dout_pin: GPIO11
    dac_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    channel: mono
    audio_dac: es8311_dac

# Media player wrapping the speaker
media_player:
  - platform: speaker
    id: openclaw_player
    name: "WalkieClaw Speaker"
    buffer_size: 50000
    announcement_pipeline:
      speaker: i2s_speaker
      num_channels: 1
    files:
      - id: beep
        file: "beep.wav"

# Microphone
microphone:
  - platform: i2s_audio
    id: mic_input
    i2s_audio_id: i2s_shared
    i2s_din_pin: GPIO13
    adc_type: external
    pdm: false
    on_data:
      - lambda: |-
          static int count = 0;
          if (count++ % 50 == 0) {
            ESP_LOGW("udp", "Sending %d bytes to bridge", x.size());
          }
          udp_stream.send(x.data(), x.size());

# =============================================================================
# Scripts
# =============================================================================
script:
  - id: play_response
    mode: single
    then:
      - lambda: |-
          id(voice_state) = 3;  // PLAYING
      - microphone.stop_capture:
          id: mic_input
      - delay: 300ms
      - switch.turn_on: speaker_enable
      - lambda: |-
          // Unmute DAC and set volume to 0dB on ES8311
          uint8_t dac_vol[2] = {0x32, 0x00};
          id(i2c_bus).write(0x18, dac_vol, 2);
          uint8_t dac_ctrl[2] = {0x37, 0x08};
          id(i2c_bus).write(0x18, dac_ctrl, 2);
      - delay: 100ms
      - media_player.volume_set:
          id: openclaw_player
          volume: !lambda 'return id(speaker_volume);'
      - media_player.play_media:
          id: openclaw_player
          media_url: !lambda 'return id(pending_wav_url);'
          announcement: true
      - lvgl.label.update:
          id: lbl_action
          text: "Speaking..."
      - light.turn_on:
          id: status_led
          brightness: 15%
          red: 100%
          green: 50%
          blue: 0%
      # Wait for playback to finish
      - delay: !lambda 'return id(play_duration_ms) + 500;'
      - lambda: |-
          id(voice_state) = 0;  // IDLE
          id(pending_wav_url) = "";
      - lvgl.label.update:
          id: lbl_action
          text: "Ready"
      - light.turn_on:
          id: status_led
          brightness: 15%
          red: 0%
          green: 100%
          blue: 0%

  - id: play_boot_chime
    mode: single
    then:
      - switch.turn_on: speaker_enable
      - lambda: |-
          // Unmute DAC and set volume to 0dB on ES8311
          uint8_t dac_vol[2] = {0x32, 0x00};
          id(i2c_bus).write(0x18, dac_vol, 2);
          uint8_t dac_ctrl[2] = {0x37, 0x08};
          id(i2c_bus).write(0x18, dac_ctrl, 2);
      - delay: 50ms
      - media_player.volume_set:
          id: openclaw_player
          volume: !lambda 'return id(speaker_volume);'
      - lambda: |-
          // Generate a short 800Hz beep tone (0.15s at 16kHz sample rate)
          const int sample_rate = 16000;
          const int duration_ms = 150;
          const int num_samples = sample_rate * duration_ms / 1000;
          const float freq = 800.0f;
          std::vector<uint8_t> pcm(num_samples * 2);
          for (int i = 0; i < num_samples; i++) {
            float t = (float)i / sample_rate;
            // Apply fade envelope to avoid clicks
            float env = 1.0f;
            if (i < 200) env = (float)i / 200.0f;
            if (i > num_samples - 200) env = (float)(num_samples - i) / 200.0f;
            int16_t sample = (int16_t)(sinf(2.0f * 3.14159f * freq * t) * 16000.0f * env);
            pcm[i * 2] = sample & 0xFF;
            pcm[i * 2 + 1] = (sample >> 8) & 0xFF;
          }
          id(i2s_speaker).play(pcm.data(), pcm.size());
      - delay: 300ms

# =============================================================================
# Runtime Config — editable via web UI at http://<device_ip>/
# =============================================================================
text:
  - platform: template
    id: cfg_bridge_host
    name: "Bridge Host"
    restore_value: true
    initial_value: ""
    optimistic: true
    min_length: 0
    max_length: 64
    mode: text
    set_action:
      - lambda: |-
          id(cfg_bridge_host).publish_state(x);
    on_value:
      then:
        - lambda: |-
            if (!x.empty() && id(wifi_status).state) {
              udp_stream.setup(x.c_str(), ${bridge_udp_port});
              ESP_LOGW("config", "Bridge host -> %s", x.c_str());
              lv_label_set_text(id(lbl_action), "Ready");
              lv_obj_invalidate(id(lbl_action));
              lv_label_set_text(id(lbl_reply), " ");
              lv_obj_invalidate(id(lbl_reply));
            }

  - platform: template
    id: cfg_api_key
    name: "Bridge API Key"
    restore_value: true
    initial_value: ""
    optimistic: true
    min_length: 0
    max_length: 64
    mode: text
    set_action:
      - lambda: |-
          id(cfg_api_key).publish_state(x);

# =============================================================================
# Buttons
# =============================================================================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO42
      inverted: true
    name: "Talk Button"
    id: btn_talk
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    on_press:
      - lambda: |-
          id(last_activity_ms) = millis();
          if (id(cfg_bridge_host).state.empty()) {
            ESP_LOGW("btn", "Bridge not configured");
            lv_label_set_text(id(lbl_action), "Set bridge IP");
            lv_obj_invalidate(id(lbl_action));
            return;
          }
          int vs = id(voice_state);
          if (vs == 1) {
            ESP_LOGW("btn", "Already recording");
            return;
          }
          // Interrupt playback/processing — stop everything and start recording
          if (vs == 3 || vs == 4) {
            ESP_LOGI("btn", "Interrupting playback");
            id(openclaw_player).make_call().set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP).perform();
            id(play_response).stop();
          }
          if (vs == 2) {
            ESP_LOGI("btn", "Interrupting processing");
          }
          id(voice_state) = 1;  // RECORDING
      - if:
          condition:
            lambda: 'return id(voice_state) == 1;'
          then:
            - light.turn_on:
                id: status_led
                brightness: 15%
                red: 100%
                green: 0%
                blue: 0%
            - lvgl.label.update:
                id: lbl_action
                text: "Listening..."
            - lambda: |-
                std::string key = id(cfg_api_key).state;
                udp_stream.send_keyed_start(key.length() >= 8 ? key.substr(0, 8).c_str() : "00000000");
            - switch.turn_off: speaker_enable
            - delay: 100ms
            - microphone.capture:
                id: mic_input
    on_release:
      - if:
          condition:
            lambda: 'return id(voice_state) == 1;'
          then:
            - microphone.stop_capture:
                id: mic_input
            - lambda: |-
                udp_stream.send_marker("STOP");
            - delay: 500ms
            - switch.turn_on: speaker_enable
            - lambda: |-
                id(voice_state) = 2;  // POLLING
                id(poll_count) = 0;
            - lvgl.label.update:
                id: lbl_action
                text: "Processing..."
            - light.turn_on:
                id: status_led
                brightness: 15%
                red: 0%
                green: 0%
                blue: 100%

  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Volume Button"
    id: btn_volume
    filters:
      - delayed_on: 100ms
      - delayed_off: 100ms
    on_press:
      - lambda: |-
          id(last_activity_ms) = millis();
          // Cycle: Off(0) → Low(45) → Medium(60) → Normal(70) → Loud(80) → Off
          float vol = id(speaker_volume);
          if (vol < 0.01f) vol = 0.45f;
          else if (vol < 0.46f) vol = 0.60f;
          else if (vol < 0.61f) vol = 0.70f;
          else if (vol < 0.71f) vol = 0.80f;
          else vol = 0.0f;
          id(speaker_volume) = vol;
          ESP_LOGW("vol", "Volume: %.0f%%", vol * 100);
      - media_player.volume_set:
          id: openclaw_player
          volume: !lambda 'return id(speaker_volume);'
      - lvgl.label.update:
          id: lbl_action
          text: !lambda |-
            float vol = id(speaker_volume);
            if (vol < 0.01f) return std::string("Vol: Off");
            if (vol < 0.46f) return std::string("Vol: Low");
            if (vol < 0.61f) return std::string("Vol: Med");
            if (vol < 0.71f) return std::string("Vol: Normal");
            return std::string("Vol: Loud");

  - platform: status
    name: "Connection Status"
    id: wifi_status

  - platform: gpio
    pin:
      number: GPIO8
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Charge Status"
    id: charge_status
    on_state:
      then:
        - lambda: |-
            // Reset sleep timer when charger state changes (especially on unplug)
            // so the device doesn't immediately sleep after being removed from power
            id(last_activity_ms) = millis();
        - component.update: battery_voltage

# =============================================================================
# Intervals — Polling + Health Check
# =============================================================================
interval:
  # Poll VPS for response every 2s while in POLLING state
  - interval: 2s
    then:
      - if:
          condition:
            lambda: 'return id(voice_state) == 2 && !id(cfg_bridge_host).state.empty();'
          then:
            - lambda: |-
                id(poll_count) += 1;
                ESP_LOGI("poll", "Polling VPS... attempt %d", id(poll_count));
            - http_request.get:
                url: !lambda 'return "http://" + id(cfg_bridge_host).state + ":${bridge_http_port}/api/response";'
                request_headers:
                  X-API-Key: !lambda 'return id(cfg_api_key).state.c_str();'
                capture_response: true
                on_response:
                  - lambda: |-
                      if (response->status_code != 200) {
                        ESP_LOGW("poll", "HTTP %d", response->status_code);
                        return;
                      }
                      ESP_LOGI("poll", "Response: %s", body.substr(0, 120).c_str());

                      // Parse JSON fields — handles "key": "val" (with space after colon)
                      auto find_json_str = [&](const std::string &key) -> std::string {
                        std::string needle = "\"" + key + "\"";
                        size_t pos = body.find(needle);
                        if (pos == std::string::npos) return "";
                        pos += needle.length();
                        // Skip colon and any whitespace
                        while (pos < body.size() && (body[pos] == ':' || body[pos] == ' ')) pos++;
                        // Expect opening quote
                        if (pos >= body.size() || body[pos] != '"') return "";
                        pos++;  // skip opening quote
                        size_t end = body.find("\"", pos);
                        if (end == std::string::npos) return "";
                        return body.substr(pos, end - pos);
                      };
                      auto find_json_num = [&](const std::string &key) -> float {
                        std::string needle = "\"" + key + "\"";
                        size_t pos = body.find(needle);
                        if (pos == std::string::npos) return 0.0f;
                        pos += needle.length();
                        // Skip colon and whitespace
                        while (pos < body.size() && (body[pos] == ':' || body[pos] == ' ')) pos++;
                        return atof(body.c_str() + pos);
                      };

                      std::string status = find_json_str("status");

                      if (status == "processing") {
                        std::string stage = find_json_str("stage");
                        std::string transcript = find_json_str("transcript");
                        // Update display with stage
                        if (stage == "transcribing") {
                          lv_label_set_text(id(lbl_action), "Transcribing...");
                        } else if (stage == "thinking") {
                          lv_label_set_text(id(lbl_action), "Thinking...");
                          // Show what it heard
                          if (!transcript.empty()) {
                            lv_label_set_text(id(lbl_reply), transcript.c_str());
                            lv_obj_set_style_text_color(id(lbl_reply), lv_color_hex(0xFFCC44), 0);
                            lv_obj_invalidate(id(lbl_reply));
                          }
                        } else if (stage == "speaking") {
                          lv_label_set_text(id(lbl_action), "Generating...");
                        }
                        lv_obj_invalidate(id(lbl_action));

                      } else if (status == "ready") {
                        id(last_activity_ms) = millis();
                        std::string wav_url = find_json_str("wav_url");
                        std::string text = find_json_str("text");
                        float duration = find_json_num("duration");

                        ESP_LOGI("poll", "Ready! wav=%s dur=%.1f", wav_url.c_str(), duration);

                        id(pending_wav_url) = wav_url;
                        id(play_duration_ms) = (int)(duration * 1000);

                        // Show response text on display
                        if (!text.empty()) {
                          lv_label_set_text(id(lbl_reply), text.c_str());
                          lv_obj_set_style_text_color(id(lbl_reply), lv_color_hex(0xFFCC44), 0);
                          lv_obj_invalidate(id(lbl_reply));
                        }

                        // Signal ready-to-play (script runs from separate interval)
                        id(voice_state) = 4;

                      } else if (status == "idle") {
                        // Still idle, keep polling
                      }
            # Timeout after 15 polls (30s)
            - if:
                condition:
                  lambda: 'return id(poll_count) >= 45 && id(voice_state) == 2;'
                then:
                  - lambda: |-
                      ESP_LOGW("poll", "Poll timeout after %d attempts", id(poll_count));
                      id(voice_state) = 0;
                  - lvgl.label.update:
                      id: lbl_action
                      text: "Timeout"
                  - delay: 2s
                  - lvgl.label.update:
                      id: lbl_action
                      text: "Ready"
                  - light.turn_on:
                      id: status_led
                      brightness: 15%
                      red: 0%
                      green: 100%
                      blue: 0%

  # Pick up ready-to-play signal and trigger playback
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(voice_state) == 4;'
          then:
            - script.execute: play_response

  # Health check — ping VPS every 30s when idle (skip if unconfigured)
  - interval: 30s
    then:
      - if:
          condition:
            lambda: 'return id(voice_state) == 0 && !id(cfg_bridge_host).state.empty();'
          then:
            - http_request.get:
                url: !lambda 'return "http://" + id(cfg_bridge_host).state + ":${bridge_http_port}/health";'
                request_headers:
                  X-API-Key: !lambda 'return id(cfg_api_key).state.c_str();'
                capture_response: true
                on_response:
                  - lambda: |-
                      if (response->status_code == 200) {
                        std::string bhost = id(cfg_bridge_host).state;
                        std::string blbl = "Bridge: " + (bhost.empty() ? "?" : bhost);
                        lv_label_set_text(id(lbl_bridge), blbl.c_str());
                        lv_obj_set_style_text_color(id(lbl_bridge), lv_color_hex(0xE6EDF3), 0);

                        // Check for pending WiFi command in health response
                        auto find_str = [&](const std::string &key) -> std::string {
                          std::string needle = "\"" + key + "\"";
                          size_t pos = body.find(needle);
                          if (pos == std::string::npos) return "";
                          pos += needle.length();
                          while (pos < body.size() && (body[pos] == ':' || body[pos] == ' ')) pos++;
                          if (pos >= body.size() || body[pos] != '"') return "";
                          pos++;
                          size_t end = body.find("\"", pos);
                          if (end == std::string::npos) return "";
                          return body.substr(pos, end - pos);
                        };
                        std::string wifi_ssid = find_str("wifi_ssid");
                        if (!wifi_ssid.empty()) {
                          std::string wifi_pass = find_str("wifi_password");
                          ESP_LOGW("cmd", "WiFi command received: SSID=%s", wifi_ssid.c_str());
                          connect_to_wifi(wifi_ssid, wifi_pass);
                          lv_label_set_text(id(lbl_action), ("WiFi:" + wifi_ssid.substr(0, 10)).c_str());
                          lv_obj_invalidate(id(lbl_action));
                        }

                        // Check for push notification
                        std::string notify_wav = find_str("notify_wav_url");
                        if (!notify_wav.empty()) {
                          id(last_activity_ms) = millis();
                          std::string notify_text = find_str("notify_text");
                          ESP_LOGW("notify", "Push notification: %s", notify_text.c_str());
                          // Show text on display
                          if (!notify_text.empty()) {
                            lv_label_set_text(id(lbl_reply), notify_text.c_str());
                            lv_obj_invalidate(id(lbl_reply));
                          }
                          // Queue playback
                          id(pending_wav_url) = notify_wav;
                          // Parse duration from notify_duration
                          auto find_num = [&](const std::string &key) -> float {
                            std::string needle = "\"" + key + "\"";
                            size_t pos = body.find(needle);
                            if (pos == std::string::npos) return 3.0f;
                            pos += needle.length();
                            while (pos < body.size() && (body[pos] == ':' || body[pos] == ' ')) pos++;
                            return atof(body.c_str() + pos);
                          };
                          id(play_duration_ms) = (int)(find_num("notify_duration") * 1000);
                          id(voice_state) = 4;  // READY_TO_PLAY
                        }
                      } else {
                        lv_label_set_text(id(lbl_bridge), "Bridge: err");
                        lv_obj_set_style_text_color(id(lbl_bridge), lv_color_hex(0xFF4444), 0);
                      }
                      lv_obj_invalidate(id(lbl_bridge));
                on_error:
                  - lambda: |-
                      lv_label_set_text(id(lbl_bridge), "Bridge: down");
                      lv_obj_set_style_text_color(id(lbl_bridge), lv_color_hex(0xFF4444), 0);
                      lv_obj_invalidate(id(lbl_bridge));

  # Amber LED pulse when on battery + idle
  - interval: 5s
    then:
      - if:
          condition:
            lambda: 'return id(voice_state) == 0 && !id(charge_status).state;'
          then:
            - light.turn_on:
                id: status_led
                brightness: 15%
                red: 100%
                green: 50%
                blue: 0%
                transition_length: 500ms
            - delay: 1s
            - light.turn_on:
                id: status_led
                brightness: 2%
                red: 100%
                green: 50%
                blue: 0%
                transition_length: 3s

  # Battery blink when charging and below 50%
  - interval: 600ms
    then:
      - lambda: |-
          if (id(battery_pct) < 0) return;  // not yet read
          bool charging = id(charge_status).state;
          int pct = id(battery_pct);
          if (charging && pct < 50) {
            id(blink_on) = !id(blink_on);
            if (id(blink_on)) {
              // Show with normal color
              uint32_t color = (pct < 10) ? 0xFF0000 : 0xFFCC00;
              lv_obj_set_style_text_color(id(lbl_battery), lv_color_hex(color), 0);
            } else {
              // Hide by setting color to black
              lv_obj_set_style_text_color(id(lbl_battery), lv_color_hex(0x000000), 0);
            }
            lv_obj_invalidate(id(lbl_battery));
          }

  # Fallback AP instructions — only before first WiFi connect (not on brief dropouts)
  - interval: 10s
    then:
      - if:
          condition:
            lambda: 'return !id(wifi_status).state && !id(boot_chime_played);'
          then:
            - lambda: |-
                lv_label_set_text(id(lbl_status), "WalkieClaw Setup");
                lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0xFF69B4), 0);
                lv_label_set_text(id(lbl_action), "Join WiFi AP");
                lv_label_set_text(id(lbl_reply), "Connect to WalkieClaw-Fallback, pass:12345678, go to 192.168.4.1");
                lv_label_set_text(id(lbl_bridge), "Bridge: no wifi");
                lv_obj_set_style_text_color(id(lbl_bridge), lv_color_hex(0xFF4444), 0);
                lv_obj_invalidate(id(lbl_status));
                lv_obj_invalidate(id(lbl_action));
                lv_obj_invalidate(id(lbl_reply));
                lv_obj_invalidate(id(lbl_bridge));

  # Auto-sleep after 5min idle on battery
  - interval: 30s
    then:
      - if:
          condition:
            lambda: |-
              return id(voice_state) == 0
                && !id(charge_status).state
                && id(last_activity_ms) > 0
                && (millis() - id(last_activity_ms)) > ${sleep_timeout_ms};
          then:
            - lvgl.label.update:
                id: lbl_action
                text: "Sleeping..."
            - light.turn_on:
                id: status_led
                brightness: 15%
                red: 50%
                green: 0%
                blue: 100%
            - delay: 2s
            - switch.turn_off: power_hold

# --- Diagnostics ---
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 30s
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_wifi
            text: !lambda |-
              if (x > -60) return "WiFi 3/3";
              if (x > -75) return "WiFi 2/3";
              return "WiFi 1/3";
  - platform: uptime
    name: "Uptime"

  - platform: adc
    pin: GPIO2
    id: battery_voltage
    name: "Battery Voltage"
    update_interval: 30s
    attenuation: 12db
    samples: 10
    filters:
      - multiply: 2.5
    on_value:
      then:
        - lambda: |-
            // LiPo: 4.2V=100%, 3.7V=50%, 3.3V=10%, 3.0V=0%
            float v = x;
            int pct;
            if (v >= 4.2f) pct = 100;
            else if (v <= 3.0f) pct = 0;
            else pct = (int)((v - 3.0f) / 1.2f * 100.0f);

            id(battery_pct) = pct;

            char buf[8];
            snprintf(buf, sizeof(buf), "%d%%", pct);
            lv_label_set_text(id(lbl_battery), buf);

            // Color: red <10%, yellow 10-49%, green 50%+
            if (pct < 10) {
              lv_obj_set_style_text_color(id(lbl_battery), lv_color_hex(0xFF0000), 0);
            } else if (pct < 50) {
              lv_obj_set_style_text_color(id(lbl_battery), lv_color_hex(0xFFCC00), 0);
            } else {
              lv_obj_set_style_text_color(id(lbl_battery), lv_color_hex(0x00FF00), 0);
            }
            lv_obj_invalidate(id(lbl_battery));

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_ip
              text: !lambda 'return "IP " + x;'
          - lambda: |-
              // Restore normal display after fallback AP setup
              lv_label_set_text(id(lbl_status), "WalkieClaw");
              lv_obj_set_style_text_color(id(lbl_status), lv_color_hex(0xFF69B4), 0);
              lv_obj_invalidate(id(lbl_status));
              {
                std::string bhost = id(cfg_bridge_host).state;
                std::string blbl = "Bridge: " + (bhost.empty() ? "..." : bhost);
                lv_label_set_text(id(lbl_bridge), blbl.c_str());
                lv_obj_set_style_text_color(id(lbl_bridge), lv_color_hex(0xFFFFFF), 0);
                lv_obj_invalidate(id(lbl_bridge));
              }
          - if:
              condition:
                lambda: 'return !id(cfg_bridge_host).state.empty();'
              then:
                - lambda: |-
                    lv_label_set_text(id(lbl_action), "Ready");
                    lv_obj_invalidate(id(lbl_action));
                    lv_label_set_text(id(lbl_reply), " ");
                    lv_obj_invalidate(id(lbl_reply));
          - if:
              condition:
                lambda: 'return id(cfg_bridge_host).state.empty();'
              then:
                - lambda: |-
                    std::string msg = "http://" + x + "/";
                    lv_label_set_text(id(lbl_reply), msg.c_str());
                    lv_obj_invalidate(id(lbl_reply));
          - if:
              condition:
                lambda: 'return !id(boot_chime_played);'
              then:
                - lambda: |-
                    id(boot_chime_played) = true;
                - delay: 2s
                - script.execute: play_boot_chime
    ssid:
      name: "Connected SSID"
